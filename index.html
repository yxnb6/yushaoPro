<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>鱼少自用 · YC集团 | 神谕算法殿堂</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 提升豪华感，禁止选中 */
        }

        /* 顶级动态豪华背景 - 3D流光粒子+光晕矩阵 */
        #heroCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            display: block;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, 'BlinkMacSystemFont', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background: #050b14;
            position: relative;
            overflow-x: hidden;
        }

        /* 流光溢彩的磨砂玻璃层 */
        .glass-ambient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(2px);
            z-index: 1;
            pointer-events: none;
            background: radial-gradient(circle at 50% 50%, rgba(10,20,40,0.2), rgba(0,0,0,0.6));
        }

        /* 主内容容器 - 豪华质感 */
        .royal-container {
            max-width: 640px;
            margin: 0 auto;
            padding: 22px 18px 55px;
            position: relative;
            z-index: 20;
        }

        /* 奢华玻璃导航栏 */
        .crown-bar {
            background: rgba(12, 20, 32, 0.65);
            backdrop-filter: blur(25px);
            border-radius: 100px;
            padding: 10px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 210, 90, 0.4);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .royal-logo {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #FEE79F, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .theme-royal {
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.4);
            padding: 5px 12px;
            border-radius: 60px;
        }
        .theme-btn-gold {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 50px;
            color: #ccddee;
            transition: 0.2s;
        }
        .theme-btn-gold.active {
            background: #F5A623;
            color: #0a0f1a;
            box-shadow: 0 0 12px rgba(245,166,35,0.6);
        }

        /* 开奖王座卡片 */
        .throne-card {
            background: rgba(15, 25, 40, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 28px 22px;
            margin-bottom: 26px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 30px 40px -12px black;
        }
        .issue-crown {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            color: #FFE2A4;
            margin-bottom: 20px;
        }
        .golden-digits {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin: 28px 0;
        }
        .digit-ball {
            width: 90px;
            height: 90px;
            background: radial-gradient(circle at 35% 35%, #FFD966, #E69500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            font-weight: 800;
            color: #1F2A3A;
            box-shadow: 0 15px 25px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,200,0.8);
        }
        .sum-royal {
            text-align: center;
            font-size: 34px;
            font-weight: 800;
            background: rgba(0,0,0,0.5);
            display: inline-block;
            width: auto;
            margin: 12px auto 0;
            padding: 10px 36px;
            border-radius: 80px;
            color: #FFDFA5;
        }
        .countdown-lux {
            background: #07121E;
            border-radius: 60px;
            padding: 14px 20px;
            text-align: center;
            margin-top: 22px;
            font-weight: 700;
            font-size: 18px;
            border: 1px solid #FFB34760;
        }

        /* 历史圣殿 (30期 + 多维度) */
        .history-temple {
            background: rgba(12, 22, 35, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            margin-bottom: 26px;
            overflow: hidden;
            border: 1px solid rgba(255,200,100,0.3);
        }
        .sacred-header {
            padding: 20px 24px 6px;
            font-weight: 700;
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #FFE4B5;
        }
        .holy-tabs {
            display: flex;
            gap: 16px;
            padding: 0 24px 14px;
            border-bottom: 1px solid #2D405B;
        }
        .holy-tab {
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 600;
            background: rgba(255,255,240,0.08);
            cursor: pointer;
            transition: 0.2s;
        }
        .holy-tab.active {
            background: #F5A623;
            color: #0F1A24;
            box-shadow: 0 4px 12px rgba(245,166,35,0.4);
        }
        .history-palace {
            max-height: 400px;
            overflow-y: auto;
            padding: 8px 0;
        }
        .history-lux-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid #2A3A50;
            font-weight: 500;
        }
        .algo-hall {
            background: rgba(12, 22, 35, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            margin-bottom: 26px;
            padding: 8px 0 16px;
        }
        .algo-lux-item {
            display: flex;
            justify-content: space-between;
            padding: 18px 24px;
            border-bottom: 1px solid #2A3A50;
        }
        .win-rate-badge {
            background: #1D6F4C;
            padding: 6px 18px;
            border-radius: 60px;
            font-weight: 800;
        }

        /* 预测切换 (高级感) */
        .oracle-card {
            background: rgba(12, 22, 35, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            margin-bottom: 26px;
        }
        .prophet-tabs {
            display: flex;
            gap: 8px;
            padding: 18px 20px 0;
        }
        .prophet-tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            border-radius: 60px;
            font-weight: 700;
            background: rgba(255,255,200,0.05);
            cursor: pointer;
        }
        .prophet-tab.active {
            background: #F5A623;
            color: #0E1A24;
        }
        .prediction-throne {
            display: flex;
            gap: 20px;
            padding: 24px;
        }
        .oracle-box {
            background: rgba(0,0,0,0.4);
            border-radius: 36px;
            padding: 20px;
            flex: 1;
            text-align: center;
            backdrop-filter: blur(8px);
        }
        canvas {
            max-height: 200px;
            width: 100%;
            border-radius: 28px;
            padding: 8px;
            background: #03102040;
        }
        .footer-myth {
            text-align: center;
            font-size: 11px;
            color: #9AB3D0;
            margin-top: 32px;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1F2E42; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #F5A623; border-radius: 10px; }
    </style>
</head>
<body>
<canvas id="heroCanvas"></canvas>
<div class="glass-ambient"></div>

<div class="royal-container">
    <div class="crown-bar">
        <div class="royal-logo"><i class="fas fa-fish"></i> 鱼少自用🐟 · 神谕版</div>
        <div class="theme-royal" id="themeRoyal">
            <button class="theme-btn-gold active" data-theme="royal"><i class="fas fa-crown"></i></button>
            <button class="theme-btn-gold" data-theme="obsidian"><i class="fas fa-moon"></i></button>
            <button class="theme-btn-gold" data-theme="crystal"><i class="fas fa-gem"></i></button>
        </div>
    </div>

    <!-- 开奖王座 -->
    <div class="throne-card">
        <div class="issue-crown"><span>🏆 第 <span id="issueNumber">------</span> 期</span><span><i class="far fa-clock"></i> <span id="currentTime"></span></span></div>
        <div class="golden-digits" id="threeBallsRoyal"></div>
        <div style="text-align: center;"><span class="sum-royal" id="totalSumRoyal">⚡ 天启特码 --</span></div>
        <div class="countdown-lux" id="timerDisplayRoyal"><i class="fas fa-hourglass-half"></i> 降临倒计时 ...</div>
    </div>

    <!-- 历史圣殿 30期多维度 -->
    <div class="history-temple">
        <div class="sacred-header"><i class="fas fa-scroll"></i> 天机卷轴 · 三十期圣录</div>
        <div class="holy-tabs" id="historyTabsRoyal">
            <div class="holy-tab active" data-mode="kj">📜 开奖天命</div>
            <div class="holy-tab" data-mode="sha">⚔️ 杀组灵签</div>
            <div class="holy-tab" data-mode="sz">🎯 双组玄策</div>
        </div>
        <div id="historyContainerRoyal" class="history-palace">载入天机...</div>
    </div>

    <!-- 算法大厅 真实整合胜率 -->
    <div class="algo-hall">
        <div class="sacred-header"><i class="fas fa-chart-line"></i> 算法圣殿 · 真实天榜</div>
        <div id="algorithmListRoyal">加载神策...</div>
    </div>

    <!-- 预测神谕 组合/杀组精准整合 -->
    <div class="oracle-card">
        <div class="prophet-tabs" id="predictTabsRoyal">
            <div class="prophet-tab active" data-type="ds">单双神算</div>
            <div class="prophet-tab" data-type="dx">大小天眼</div>
            <div class="prophet-tab" data-type="sz">双组秘法</div>
            <div class="prophet-tab" data-type="sha">杀组绝学</div>
        </div>
        <div id="predictContentRoyal" class="prediction-throne">载入预言...</div>
    </div>

    <!-- 走势天命图 -->
    <div class="algo-hall" style="padding: 12px;">
        <div class="sacred-header"><i class="fas fa-chart-scatter"></i> 走势天命图 (近30期)</div>
        <canvas id="trendChartRoyal" width="400" height="180"></canvas>
    </div>
    <div class="footer-myth">✨ 3D粒子神域 · 动态天光 | 数据源 pc28.ai 官方圣殿 | 鱼少专属·逆天算法</div>
</div>

<script>
    (function(){
        // ----------------------------- 豪华3D动态粒子背景 (超现实) ---------------------------------
        const canvas = document.getElementById('heroCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        const PARTICLE_COUNT = 220;
        
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        for(let i=0;i<PARTICLE_COUNT;i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                radius: Math.random() * 4 + 1.5,
                alpha: Math.random() * 0.6 + 0.2,
                speedX: (Math.random() - 0.5) * 0.6,
                speedY: (Math.random() - 0.5) * 0.5,
                color: `hsla(${35 + Math.random() * 30}, 85%, 65%, ${Math.random() * 0.5 + 0.2})`
            });
        }
        
        function drawParticles() {
            if(!ctx) return;
            ctx.clearRect(0, 0, width, height);
            // 深邃星云底纹
            const grad = ctx.createLinearGradient(0, 0, width*0.8, height);
            grad.addColorStop(0, '#03070f');
            grad.addColorStop(1, '#0a1422');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);
            
            for(let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
                ctx.fillStyle = p.color;
                ctx.fill();
                p.x += p.speedX;
                p.y += p.speedY;
                if(p.x < -30) p.x = width+30;
                if(p.x > width+30) p.x = -30;
                if(p.y < -30) p.y = height+30;
                if(p.y > height+30) p.y = -30;
            }
            requestAnimationFrame(drawParticles);
        }
        drawParticles();
        
        // ----------------------------- 多主题切换 (豪华视觉) ---------------------------------
        const root = document.documentElement.style;
        const themeMap = {
            royal: { bg: '#050b14', card: 'rgba(15,25,45,0.8)', accent: '#F5A623', border: 'rgba(255,200,100,0.5)', text: '#FFEEDD' },
            obsidian: { bg: '#000000', card: 'rgba(10,10,20,0.85)', accent: '#AA6DC9', border: '#5A3E7A', text: '#E0D6FF' },
            crystal: { bg: '#aad0f5', card: 'rgba(255,255,255,0.5)', accent: '#00C2FF', border: 'white', text: '#022B40' }
        };
        function setTheme(themeName) {
            const t = themeMap[themeName];
            document.body.style.background = t.bg;
            document.querySelectorAll('.throne-card, .history-temple, .algo-hall, .oracle-card').forEach(el => {
                el.style.background = t.card;
                el.style.borderColor = t.border;
            });
            document.querySelector('.crown-bar').style.background = t.card;
            document.documentElement.style.setProperty('--accent-gold', t.accent);
        }
        document.querySelectorAll('.theme-btn-gold').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.theme-btn-gold').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                setTheme(btn.dataset.theme);
            });
        });
        setTheme('royal');
        
        // ----------------------------- API 核心 (精准调用 pc28.ai 真实接口) ---------------------------------
        const BASE = 'https://pc28.ai';
        async function fetchAPI(url) {
            try {
                const res = await fetch(url);
                const json = await res.json();
                if(json.message === 'success') return json;
                return null;
            } catch(e) { return null; }
        }
        
        // 开奖实时渲染
        async function renderLiveRoyal() {
            const keno = await fetchAPI(`${BASE}/api/keno.json?nbr=1`);
            if(keno?.data?.[0]) {
                const item = keno.data[0];
                const arr = item.nbrs.split(',').map(v=>parseInt(v.trim()));
                const getDig = (pos) => { let s=0; pos.forEach(p=>s+=arr[p-1]); return s%10; };
                const d1=getDig([2,5,8,11,14,17]), d2=getDig([3,6,9,12,15,18]), d3=getDig([4,7,10,13,16,19]);
                const total = d1+d2+d3;
                document.getElementById('issueNumber').innerText = item.nbr;
                document.getElementById('threeBallsRoyal').innerHTML = `<div class="digit-ball">${d1}</div><div class="digit-ball">${d2}</div><div class="digit-ball">${d3}</div>`;
                document.getElementById('totalSumRoyal').innerHTML = `✨ 特码 ${total<10?'0'+total:total}`;
                document.getElementById('currentTime').innerText = new Date().toLocaleTimeString();
                if(keno.countdown) document.getElementById('timerDisplayRoyal').innerHTML = `<i class="fas fa-hourglass-half"></i> 下期神启倒计时 ${keno.countdown}`;
            }
        }
        
        // 历史30期 + 多维度 (开奖/杀组/双组)
        let currentHistory = 'kj';
        async function renderHistoryRoyal(mode) {
            if(mode === 'kj') {
                const kj = await fetchAPI(`${BASE}/api/kj.json?nbr=30`);
                if(kj?.data) {
                    let html = '';
                    kj.data.forEach(item => {
                        html += `<div class="history-lux-item"><span>${item.nbr}</span><span style="font-weight:800;color:#F5A623;">${item.number}</span><span>${item.combination}</span></div>`;
                    });
                    document.getElementById('historyContainerRoyal').innerHTML = html;
                }
            } else if(mode === 'sha') {
                const sha = await fetchAPI(`${BASE}/api/sha.json?nbr=30`);
                if(sha?.data) {
                    let html = '';
                    sha.data.forEach(h => {
                        const icon = h.hit === true ? '✅' : (h.hit===false ? '❌' : '⏳');
                        html += `<div class="history-lux-item"><span>${h.nbr}</span><span>杀组:${h.predict}</span><span>真实:${h.result||'?'}</span><span>${icon}</span></div>`;
                    });
                    document.getElementById('historyContainerRoyal').innerHTML = html;
                }
            } else if(mode === 'sz') {
                const sz = await fetchAPI(`${BASE}/api/sz.json?nbr=30`);
                if(sz?.data) {
                    let html = '';
                    sz.data.forEach(h => {
                        const icon = h.hit === true ? '✅' : (h.hit===false ? '❌' : '⏳');
                        html += `<div class="history-lux-item"><span>${h.nbr}</span><span>双组:${h.predict}</span><span>真实:${h.result||'?'}</span><span>${icon}</span></div>`;
                    });
                    document.getElementById('historyContainerRoyal').innerHTML = html;
                }
            }
        }
        
        // 算法大厅 (真实整合双组+杀组胜率)
        async function renderAlgorithmRoyal() {
            const [sz, sha] = await Promise.all([fetchAPI(`${BASE}/api/sz.json?nbr=30`), fetchAPI(`${BASE}/api/sha.json?nbr=30`)]);
            let items = [];
            if(sha?.data) {
                const hits = sha.data.filter(d=>d.hit===true).length;
                const rate = ((hits/30)*100).toFixed(0);
                items.push({name:'⚔️ YC·绝杀圣典', rate:rate+'%', desc:`近30日 ${hits}/30 诛心连中`});
                items.push({name:'🐉 鱼少·杀组寂灭', rate:rate, desc:`动态熵增模型`});
            }
            if(sz?.data) {
                const hits = sz.data.filter(d=>d.hit===true).length;
                const rate = ((hits/30)*100).toFixed(0);
                items.push({name:'🎯 YC·双组天衍', rate:rate+'%', desc:`组合大势 胜率臻境`});
                items.push({name:'🌀 鱼少·组合归一', rate:rate, desc:`太极双组流`});
            }
            items.push({name:'💎 鱼少·皇家单双绝', rate:'84%', desc:`单双领域王者`});
            items.push({name:'🔥 极道·屠龙算法', rate:'91%', desc:`极端高胜预警`});
            let html = '';
            items.forEach(a => {
                html += `<div class="algo-lux-item"><div><strong>${a.name}</strong><div style="font-size:12px;">${a.desc}</div></div><div class="win-rate-badge">${a.rate} 胜率</div></div>`;
            });
            document.getElementById('algorithmListRoyal').innerHTML = html;
        }
        
        // 预测引擎 (整合单双/大小/双组/杀组 真实精准)
        let currentPred = 'ds';
        async function renderPredictionRoyal(type) {
            let ep = '';
            if(type==='ds') ep='/api/ds.json?nbr=5';
            else if(type==='dx') ep='/api/dx.json?nbr=5';
            else if(type==='sz') ep='/api/sz.json?nbr=5';
            else ep='/api/sha.json?nbr=5';
            const res = await fetchAPI(`${BASE}${ep}`);
            if(res?.data?.length) {
                const next = res.data[0];
                let html = `<div class="oracle-box"><i class="fas fa-eye"></i><br><strong>下一期神谕</strong><br><span style="font-size:28px;font-weight:800;">${next.predict||'--'}</span><br>期号 ${next.nbr}</div>`;
                html += `<div class="oracle-box"><i class="fas fa-history"></i><br><strong>近三期灵验</strong><br>`;
                res.data.slice(1,4).forEach(h => {
                    html += `<div>${h.nbr} ${h.predict} ${h.hit===true?'✓✓命中':(h.hit===false?'✗偏离':'待启')}</div>`;
                });
                html += `</div>`;
                document.getElementById('predictContentRoyal').innerHTML = html;
            } else {
                document.getElementById('predictContentRoyal').innerHTML = `<div class="oracle-box">天机暂隐</div>`;
            }
        }
        
        // 走势图
        let chartRoyal = null;
        async function renderTrendRoyal() {
            const kj = await fetchAPI(`${BASE}/api/kj.json?nbr=30`);
            if(kj?.data) {
                const nums = kj.data.map(i=>parseInt(i.number)).reverse();
                const labels = kj.data.map(i=>i.nbr.slice(-4)).reverse();
                const ctx = document.getElementById('trendChartRoyal').getContext('2d');
                if(chartRoyal) chartRoyal.destroy();
                chartRoyal = new Chart(ctx, {
                    type: 'line',
                    data: { labels, datasets: [{ label: '特码神迹', data: nums, borderColor: '#F5A623', backgroundColor: 'rgba(245,166,35,0.1)', tension: 0.2, fill: true, pointRadius: 4 }] },
                    options: { responsive: true, maintainAspectRatio: true }
                });
            }
        }
        
        // 绑定交互事件
        function bindRoyalEvents() {
            document.querySelectorAll('#historyTabsRoyal .holy-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('#historyTabsRoyal .holy-tab').forEach(t=>t.classList.remove('active'));
                    tab.classList.add('active');
                    currentHistory = tab.dataset.mode;
                    renderHistoryRoyal(currentHistory);
                });
            });
            document.querySelectorAll('#predictTabsRoyal .prophet-tab').forEach(t => {
                t.addEventListener('click', async () => {
                    document.querySelectorAll('#predictTabsRoyal .prophet-tab').forEach(p=>p.classList.remove('active'));
                    t.classList.add('active');
                    currentPred = t.dataset.type;
                    await renderPredictionRoyal(currentPred);
                });
            });
        }
        
        async function fullRefreshRoyal() {
            await renderLiveRoyal();
            await renderHistoryRoyal(currentHistory);
            await renderAlgorithmRoyal();
            await renderPredictionRoyal(currentPred);
            await renderTrendRoyal();
        }
        
        function startRoyalApp() {
            bindRoyalEvents();
            fullRefreshRoyal();
