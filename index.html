<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PRO28 · 鱼少智测 | 极简预测版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b1020; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; color: #e2e8f0; padding: 0 0 60px 0; }
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0b1020; padding: 20px; }
        .auth-card { width: 100%; max-width: 320px; text-align: center; }
        .auth-card h1 { font-size: 32px; font-weight: 700; margin-bottom: 24px; color: #ffffff; }
        .auth-card input { width: 100%; padding: 12px 16px; margin-bottom: 12px; border: 1px solid #2d3748; border-radius: 8px; font-size: 16px; background: #1a2035; color: #e2e8f0; }
        .auth-card input:focus { outline: none; border-color: #3b82f6; }
        .auth-card button { width: 100%; padding: 12px; background: #3b82f6; border: none; border-radius: 8px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; }
        .auth-card button:hover { background: #2563eb; }
        .error-msg { color: #ef4444; font-size: 12px; margin-top: 12px; min-height: 30px; }
        .main-content { display: none; max-width: 600px; margin: 0 auto; }
        .status-bar { display: flex; justify-content: space-between; align-items: baseline; padding: 12px 16px; border-bottom: 1px solid #2d3748; font-size: 12px; color: #94a3b8; }
        .live-dot { display: inline-block; width: 8px; height: 8px; background: #22c55e; border-radius: 50%; margin-right: 6px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
        .sync-btn { background: #3b82f6; color: white; border: none; border-radius: 20px; padding: 4px 12px; font-size: 11px; margin-left: 8px; cursor: pointer; }
        .tab-nav { display: flex; border-bottom: 1px solid #2d3748; }
        .tab { flex: 1; text-align: center; padding: 12px 0; font-size: 14px; font-weight: 500; color: #94a3b8; cursor: pointer; background: none; border: none; }
        .tab.active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        .panel { display: none; padding: 16px; }
        .panel.active { display: block; }
        .current-card { background: #1a2035; border-radius: 16px; padding: 16px; text-align: center; margin-bottom: 16px; }
        .issue-number { font-size: 12px; color: #94a3b8; margin-bottom: 12px; }
        .balls { display: flex; justify-content: center; align-items: center; gap: 8px; margin: 16px 0; flex-wrap: wrap; }
        .ball { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; background: #2d3748; color: #ffffff; }
        .ball.sum { background: #3b82f6; color: white; }
        .result-badge { display: inline-block; padding: 4px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-top: 8px; }
        .badge-ds { background: #3b82f6; color: white; }
        .badge-dd { background: #ef4444; color: white; }
        .badge-xs { background: #10b981; color: white; }
        .badge-xd { background: #f59e0b; color: white; }
        
        /* 极简预测样式 */
        .predict-simple {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .predict-item {
            background: #1a2035;
            border-radius: 16px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .predict-label {
            font-size: 16px;
            font-weight: 500;
            color: #94a3b8;
        }
        .predict-value {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
        }
        .predict-value.kill {
            color: #ef4444;
        }
        .predict-value.double {
            color: #3b82f6;
        }
        .predict-value.triple {
            color: #10b981;
        }
        .group-list {
            display: flex;
            gap: 16px;
        }
        .group-item {
            font-size: 24px;
            font-weight: 700;
            background: #2d3748;
            padding: 6px 18px;
            border-radius: 40px;
        }
        
        .stats-bar { display: flex; justify-content: space-between; background: #1a2035; padding: 12px 16px; border-radius: 12px; margin-top: 16px; font-size: 12px; flex-wrap: wrap; gap: 8px; }
        .table-container { overflow-x: auto; margin-top: 16px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { padding: 10px 6px; text-align: center; border-bottom: 1px solid #2d3748; }
        th { color: #94a3b8; font-weight: 500; background: #1a2035; }
        .hit-yes { color: #10b981; font-weight: 600; }
        .hit-no { color: #ef4444; font-weight: 600; }
        .history-balls { display: inline-flex; gap: 4px; }
        .history-ball { background: #2d3748; width: 28px; height: 28px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 600px; margin: 0 auto; display: flex; justify-content: space-around; background: #1a2035; border-top: 1px solid #2d3748; padding: 8px 0; }
        .nav-item { text-align: center; font-size: 10px; color: #94a3b8; background: none; border: none; cursor: pointer; }
        .nav-item.active { color: #3b82f6; }
        .text-gray { color: #94a3b8; }
        .accuracy-badge { background: #10b98120; padding: 4px 12px; border-radius: 20px; color: #10b981; font-weight: 600; }
    </style>
</head>
<body>

<div id="authPanel" class="auth-container">
    <div class="auth-card">
        <h1>PRO28</h1>
        <input type="text" id="username" placeholder="用户名" value="鱼少">
        <input type="password" id="password" placeholder="密码">
        <button id="loginBtn">🔓 解锁系统</button>
        <div id="errorMsg" class="error-msg"></div>
    </div>
</div>

<div id="mainContent" class="main-content">
    <div class="status-bar">
        <div><span class="live-dot"></span><span id="apiStatus">连接官方API...</span><button id="manualSyncBtn" class="sync-btn">刷新</button></div>
        <div><span id="refreshTime">--:--:--</span></div>
    </div>

    <div class="tab-nav">
        <button class="tab active" data-tab="predict">📊 预测</button>
        <button class="tab" data-tab="trend">📜 历史开奖</button>
        <button class="tab" data-tab="stats">📉 遗漏统计</button>
    </div>

    <!-- 预测面板 - 极简清晰 -->
    <div id="predictPanel" class="panel active">
        <div class="current-card">
            <div class="issue-number">第 <span id="currentIssue">------</span> 期</div>
            <div class="balls">
                <span class="ball" id="ball1">--</span><span>+</span>
                <span class="ball" id="ball2">--</span><span>+</span>
                <span class="ball" id="ball3">--</span><span>=</span>
                <span class="ball sum" id="sumBall">--</span>
            </div>
            <div><span id="resultType" class="result-badge badge-ds">--</span></div>
        </div>

        <div class="predict-simple">
            <div class="predict-item">
                <span class="predict-label">🔪 杀组 (排除)</span>
                <span class="predict-value kill" id="killGroup">--</span>
            </div>
            <div class="predict-item">
                <span class="predict-label">⚡ 两组暴击 (首选)</span>
                <div class="group-list">
                    <span class="group-item" style="background:#3b82f6;" id="double1">--</span>
                    <span class="group-item" style="background:#ef4444;" id="double2">--</span>
                </div>
            </div>
            <div class="predict-item">
                <span class="predict-label">🛡️ 三组稳健 (次选)</span>
                <div class="group-list">
                    <span class="group-item" style="background:#3b82f6;" id="triple1">--</span>
                    <span class="group-item" style="background:#ef4444;" id="triple2">--</span>
                    <span class="group-item" style="background:#10b981;" id="triple3">--</span>
                </div>
            </div>
        </div>
        <div class="stats-bar">
            <span>📊 杀组准确率: <span id="killAccuracy" class="accuracy-badge">--%</span></span>
            <span id="algorithmReason" class="text-gray">官方AI预测</span>
        </div>
    </div>

    <!-- 历史开奖面板 -->
    <div id="trendPanel" class="panel">
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>期号</th><th>开奖三码</th><th>和值</th><th>大小单双</th><th>杀组(预测)</th><th>命中</th></tr>
                </thead>
                <tbody id="historyBody"><tr><td colspan="6" style="text-align:center;">加载中...</td></tr></tbody>
            </table>
        </div>
        <div class="stats-bar">
            <span>总期数: <span id="totalCount">0</span></span>
            <span>杀组命中率: <span id="hitRate" style="color:#10b981;">0%</span></span>
            <button id="clearHistory" style="background:none;border:none;color:#ef4444;font-size:12px;cursor:pointer;">清空记录</button>
        </div>
    </div>

    <!-- 遗漏统计面板 -->
    <div id="statsPanel" class="panel">
        <div class="stats-bar" style="flex-direction:column; gap:12px;">
            <div>📈 大数未开: <strong id="missBig">--</strong> 期</div>
            <div>📉 小数未开: <strong id="missSmall">--</strong> 期</div>
            <div>🔴 单数未开: <strong id="missOdd">--</strong> 期</div>
            <div>🔵 双数未开: <strong id="missEven">--</strong> 期</div>
            <div>🎯 大单未开: <strong id="missDaDan">--</strong> 期</div>
            <div>🎯 大双未开: <strong id="missDaShuang">--</strong> 期</div>
            <div>🎯 小单未开: <strong id="missXiaoDan">--</strong> 期</div>
            <div>🎯 小双未开: <strong id="missXiaoShuang">--</strong> 期</div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" data-nav="predict">📊 预测</button>
        <button class="nav-item" data-nav="trend">📜 历史</button>
        <button class="nav-item" data-nav="stats">📉 遗漏</button>
    </div>
</div>

<script>
(function() {
    // ==================== 认证 ====================
    const USER = "鱼少";
    const PASS = "1201314";
    const auth = document.getElementById('authPanel');
    const main = document.getElementById('mainContent');
    const userInput = document.getElementById('username');
    const passInput = document.getElementById('password');
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');

    function login() {
        const u = (userInput.value || "").trim();
        const p = (passInput.value || "").trim();
        if (u === USER && p === PASS) {
            auth.style.display = "none";
            main.style.display = "block";
            startApp();
        } else {
            err.textContent = "❌ 用户名或密码错误";
        }
    }
    btn.onclick = login;
    passInput.onkeypress = e => { if (e.key === "Enter") login(); };

    // ==================== 全局数据 ====================
    let historyData = [];        // { issue, numbers, sum, type, kill, hit }
    const STORAGE_KEY = 'pro28_simple_v1';
    let currentIssue = null;
    let pollingTimer = null;
    const API_BASE = 'https://pc28.ai';

    function getTypeFromCombination(comb) {
        if (comb === '大单') return '大单';
        if (comb === '大双') return '大双';
        if (comb === '小单') return '小单';
        if (comb === '小双') return '小双';
        return '大双';
    }

    // 从Keno计算三码
    function computeThreeNumbersFromKeno(nbrsArray) {
        if (!nbrsArray || nbrsArray.length !== 20) return [0,0,0];
        const idx1 = [1,4,7,10,13,16];
        let sum1 = 0; for (let i of idx1) sum1 += nbrsArray[i];
        const num1 = sum1 % 10;
        const idx2 = [2,5,8,11,14,17];
        let sum2 = 0; for (let i of idx2) sum2 += nbrsArray[i];
        const num2 = sum2 % 10;
        const idx3 = [3,6,9,12,15,18];
        let sum3 = 0; for (let i of idx3) sum3 += nbrsArray[i];
        const num3 = sum3 % 10;
        return [num1, num2, num3];
    }

    // 获取最新开奖（三码+和值+类型）
    async function fetchLatestDraw() {
        try {
            const kjRes = await fetch(`${API_BASE}/api/kj.json?nbr=1`, { cache: "no-store" });
            if (!kjRes.ok) throw new Error();
            const kjData = await kjRes.json();
            if (kjData.message !== 'success' || !kjData.data || kjData.data.length === 0) throw new Error();
            const latest = kjData.data[0];
            const issue = latest.nbr;
            const combination = latest.combination;
            const sum = parseInt(latest.number, 10);
            const type = getTypeFromCombination(combination);
            
            const kenoRes = await fetch(`${API_BASE}/api/keno.json?nbr=1`, { cache: "no-store" });
            let numbers = [0,0,0];
            if (kenoRes.ok) {
                const kenoData = await kenoRes.json();
                if (kenoData.message === 'success' && kenoData.data && kenoData.data.length > 0) {
                    const nbrsStr = kenoData.data[0].nbrs;
                    if (nbrsStr) {
                        const nbrsArray = nbrsStr.split(',').map(v => parseInt(v.trim(), 10));
                        if (nbrsArray.length === 20) numbers = computeThreeNumbersFromKeno(nbrsArray);
                    }
                }
            }
            return { issue, numbers, sum, type, combination };
        } catch (err) {
            console.warn(err);
            return null;
        }
    }

    // 获取AI预测 (杀组 + 双组)
    async function fetchAIPredictions() {
        try {
            const shaRes = await fetch(`${API_BASE}/api/sha.json?nbr=1`, { cache: "no-store" });
            let killPredict = null;
            if (shaRes.ok) {
                const shaData = await shaRes.json();
                if (shaData.message === 'success' && shaData.data && shaData.data.length > 0) {
                    killPredict = shaData.data[0].predict;
                }
            }
            const szRes = await fetch(`${API_BASE}/api/sz.json?nbr=1`, { cache: "no-store" });
            let szPredict = null;
            if (szRes.ok) {
                const szData = await szRes.json();
                if (szData.message === 'success' && szData.data && szData.data.length > 0) {
                    szPredict = szData.data[0].predict;
                }
            }
            return { killPredict, szPredict };
        } catch(e) { return { killPredict: null, szPredict: null }; }
    }

    // 本地备用预测（基于历史热号）
    function getLocalPredictions() {
        if (historyData.length < 3) {
            return { kill: '小单', double1: '大双', double2: '大单', triple1: '大双', triple2: '大单', triple3: '小双' };
        }
        const count = { '大双':0, '大单':0, '小双':0, '小单':0 };
        for (let i = 0; i < Math.min(historyData.length, 30); i++) count[historyData[i].type]++;
        const sorted = Object.entries(count).sort((a,b) => b[1] - a[1]);
        const hot1 = sorted[0][0], hot2 = sorted[1][0], hot3 = sorted[2][0];
        const killMap = { '大双':'小单', '大单':'小双', '小双':'大单', '小单':'大双' };
        const kill = killMap[hot1] || '小单';
        return { kill, double1: hot1, double2: hot2, triple1: hot1, triple2: hot2, triple3: hot3 };
    }

    // 更新预测UI（简洁展示）
    async function updatePredictionsUI() {
        const ai = await fetchAIPredictions();
        const local = getLocalPredictions();
        const finalKill = ai.killPredict || local.kill;
        let double1 = local.double1, double2 = local.double2;
        if (ai.szPredict) {
            double1 = ai.szPredict;
            double2 = local.double1 !== ai.szPredict ? local.double1 : local.double2;
        }
        const triple = [double1, double2, local.triple3];
        
        document.getElementById('killGroup').innerText = finalKill;
        document.getElementById('double1').innerText = double1;
        document.getElementById('double2').innerText = double2;
        document.getElementById('triple1').innerText = triple[0];
        document.getElementById('triple2').innerText = triple[1];
        document.getElementById('triple3').innerText = triple[2];
        
        const reason = ai.killPredict ? "官方杀组API" : "本地热号策略";
        document.getElementById('algorithmReason').innerHTML = reason;
        if (historyData.length > 0) {
            const hitCount = historyData.filter(r => r.hit).length;
            document.getElementById('killAccuracy').innerHTML = Math.round((hitCount / historyData.length) * 100) + '%';
        }
    }

    function addRecord(issue, numbers, sum, type, killValue) {
        if (historyData.some(r => r.issue === issue)) return false;
        const hit = (killValue !== type);
        historyData.unshift({ issue, numbers: [...numbers], sum, type, kill: killValue, hit, time: Date.now() });
        if (historyData.length > 500) historyData.pop();
        saveData();
        return true;
    }

    async function refreshAll() {
        const statusEl = document.getElementById('apiStatus');
        if (statusEl) statusEl.innerHTML = '🔄 同步中...';
        try {
            const draw = await fetchLatestDraw();
            if (!draw) throw new Error("无数据");
            const { issue, numbers, sum, type } = draw;
            const ai = await fetchAIPredictions();
            const killForRecord = ai.killPredict || (() => { const m = { '大双':'小单', '大单':'小双', '小双':'大单', '小单':'大双' }; return m[type] || '小单'; })();
            
            if (issue && issue !== currentIssue) {
                currentIssue = issue;
                addRecord(issue, numbers, sum, type, killForRecord);
                updateDisplay(issue, numbers, sum, type);
                if (statusEl) statusEl.innerHTML = `✅ 期号 ${issue}`;
            } else {
                if (statusEl) statusEl.innerHTML = `✅ 最新 ${issue || '--'}`;
                if (issue) updateDisplay(issue, numbers, sum, type);
            }
            await updatePredictionsUI();
            renderHistoryTable();
            updateMissStats();
        } catch (err) {
            console.error(err);
            if (statusEl) statusEl.innerHTML = '⚠️ 接口重试中';
            await updatePredictionsUI();
        }
        document.getElementById('refreshTime').innerText = new Date().toLocaleTimeString();
    }

    function updateDisplay(issue, numbers, sum, type) {
        document.getElementById('currentIssue').innerText = issue;
        document.getElementById('ball1').innerText = numbers[0];
        document.getElementById('ball2').innerText = numbers[1];
        document.getElementById('ball3').innerText = numbers[2];
        document.getElementById('sumBall').innerText = sum;
        const typeEl = document.getElementById('resultType');
        typeEl.innerText = type;
        let cls = 'badge-ds';
        if (type === '大单') cls = 'badge-dd';
        else if (type === '小双') cls = 'badge-xs';
        else if (type === '小单') cls = 'badge-xd';
        typeEl.className = 'result-badge ' + cls;
    }

    function updateMissStats() {
        if (historyData.length === 0) return;
        const lastIdx = { '大双': null, '大单': null, '小双': null, '小单': null };
        for (let i = 0; i < historyData.length; i++) {
            const t = historyData[i].type;
            if (lastIdx[t] === null) lastIdx[t] = i;
        }
        document.getElementById('missDaShuang').innerText = lastIdx['大双'] !== null ? lastIdx['大双'] : historyData.length;
        document.getElementById('missDaDan').innerText = lastIdx['大单'] !== null ? lastIdx['大单'] : historyData.length;
        document.getElementById('missXiaoShuang').innerText = lastIdx['小双'] !== null ? lastIdx['小双'] : historyData.length;
        document.getElementById('missXiaoDan').innerText = lastIdx['小单'] !== null ? lastIdx['小单'] : historyData.length;
        
        let bigIdx=null, smallIdx=null, oddIdx=null, evenIdx=null;
        for (let i=0; i<historyData.length; i++) {
            const t = historyData[i].type;
            if ((t==='大双'||t==='大单') && bigIdx===null) bigIdx=i;
            if ((t==='小双'||t==='小单') && smallIdx===null) smallIdx=i;
            if ((t==='大单'||t==='小单') && oddIdx===null) oddIdx=i;
            if ((t==='大双'||t==='小双') && evenIdx===null) evenIdx=i;
        }
        document.getElementById('missBig').innerText = bigIdx!==null ? bigIdx : historyData.length;
        document.getElementById('missSmall').innerText = smallIdx!==null ? smallIdx : historyData.length;
        document.getElementById('missOdd').innerText = oddIdx!==null ? oddIdx : historyData.length;
        document.getElementById('missEven').innerText = evenIdx!==null ? evenIdx : historyData.length;
    }

    function renderHistoryTable() {
        const tbody = document.getElementById('historyBody');
        if (historyData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">暂无数据</td></tr>';
            document.getElementById('totalCount').innerText = '0';
            document.getElementById('hitRate').innerText = '0%';
            return;
        }
        let rows = '', hitCount = 0;
        for (let i = 0; i < Math.min(historyData.length, 100); i++) {
            const r = historyData[i];
            if (r.hit) hitCount++;
            rows += `<tr>
                <td>${r.issue}</td>
                <td><div class="history-balls"><span class="history-ball">${r.numbers[0]}</span><span class="history-ball">${r.numbers[1]}</span><span class="history-ball">${r.numbers[2]}</span></div></td>
                <td>${r.sum}</td>
                <td>${r.type}</td>
                <td>${r.kill}</td>
                <td class="${r.hit ? 'hit-yes' : 'hit-no'}">${r.hit ? '✓ 中' : '✗ 错'}</td>
            </tr>`;
        }
        tbody.innerHTML = rows;
        document.getElementById('totalCount').innerText = historyData.length;
        document.getElementById('hitRate').innerText = Math.round((hitCount / historyData.length) * 100) + '%';
    }

    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(historyData.slice(0, 500)));
        renderHistoryTable();
        updateMissStats();
    }

    function loadHistory() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) { try { historyData = JSON.parse(stored); } catch(e) { historyData = []; } }
        renderHistoryTable();
        updateMissStats();
        if (historyData.length > 0) {
            const last = historyData[0];
            updateDisplay(last.issue, last.numbers, last.sum, last.type);
            currentIssue = last.issue;
        }
    }

    function initTabs() {
        const tabs = document.querySelectorAll('.tab');
        const navs = document.querySelectorAll('.nav-item');
        const panels = ['predict', 'trend', 'stats'];
        function switchTab(tabId) {
            panels.forEach(id => document.getElementById(id + 'Panel').classList.remove('active'));
            document.getElementById(tabId + 'Panel').classList.add('active');
            tabs.forEach(tab => tab.dataset.tab === tabId ? tab.classList.add('active') : tab.classList.remove('active'));
            navs.forEach(nav => nav.dataset.nav === tabId ? nav.classList.add('active') : nav.classList.remove('active'));
        }
        tabs.forEach(tab => tab.onclick = () => switchTab(tab.dataset.tab));
        navs.forEach(nav => nav.onclick = () => switchTab(nav.dataset.nav));
    }

    function startApp() {
        loadHistory();
        refreshAll();
        if (pollingTimer) clearInterval(pollingTimer);
        pollingTimer = setInterval(refreshAll, 18000);
        initTabs();
        document.getElementById('manualSyncBtn').onclick = () => refreshAll();
        document.getElementById('clearHistory').onclick = () => {
            if (confirm('清空所有历史记录？')) {
                historyData = [];
                saveData();
                currentIssue = null;
                updateDisplay('------', ['--','--','--'], '--', '大双');
                document.getElementById('resultType').className = 'result-badge badge-ds';
                updateMissStats();
                refreshAll();
            }
        };
    }
})();
</script>
</body>
</html>
