<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站维护中</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ios-bg: #000000;
            --card-bg: rgba(28, 28, 30, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-primary: #FFFFFF;
            --text-secondary: #8E8E93;
            --ios-blue: #007AFF;
            --blur: 20px;
            --radius: 18px;
            --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-primary);
            overflow: hidden;
        }

        /* 背景动态光斑 */
        .bg-glow {
            position: fixed; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(0, 122, 255, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 70% 80%, rgba(88, 86, 214, 0.1) 0%, transparent 40%);
            animation: rotateBg 20s linear infinite;
            z-index: 0;
        }
        @keyframes rotateBg { to { transform: rotate(360deg); } }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            text-align: center;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 玻璃态卡片 */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            padding: 32px 24px;
            margin-bottom: 20px;
        }

        /* 图标 */
        .icon-wrapper {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #34c759, #30d158);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 10px 30px rgba(52, 199, 89, 0.3);
            animation: float 3s ease-in-out infinite;
        }
        .icon-wrapper i { font-size: 32px; color: white; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 28px;
        }

        /* 进度条 (Indeterminate) */
        .progress-container {
            margin: 24px 0;
        }
        .progress-bar {
            height: 5px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-shimmer {
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--ios-blue), transparent);
            border-radius: 10px;
            animation: shimmer 1.5s infinite linear;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }
        .progress-text {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 10px;
        }

        /* 时间信息 */
        .time-info {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.25);
            border-radius: 12px;
            padding: 16px;
            margin-top: 20px;
            font-size: 14px;
        }
        .time-item span {
            display: block;
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 4px;
        }
        .time-item strong {
            font-weight: 600;
        }

        /* 表单 */
        .notify-form {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }
        .notify-form input {
            flex: 1;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 15px;
            outline: none;
        }
        .notify-form input::placeholder { color: var(--text-secondary); }
        .notify-form button {
            padding: 14px 22px;
            border-radius: 12px;
            border: none;
            background: var(--ios-blue);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .notify-form button:hover { opacity: 0.9; transform: scale(0.98); }

        /* Footer */
        footer {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 20px;
        }

        /* iOS Alert Modal */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: none;
            place-items: center;
            z-index: 100;
        }
        .modal {
            background: rgba(40, 40, 42, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 14px;
            width: 270px;
            text-align: center;
            overflow: hidden;
            animation: scaleIn 0.2s ease-out;
        }
        @keyframes scaleIn { from { transform: scale(1.1); opacity: 0; } }
        .modal-title { font-size: 17px; font-weight: 600; padding: 20px 16px 8px; }
        .modal-message { font-size: 13px; color: var(--text-secondary); padding: 0 16px 20px; }
        .modal-action {
            border-top: 0.5px solid rgba(255,255,255,0.2);
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ios-blue);
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="container">
        <div class="glass-card">
            <div class="icon-wrapper">
                <i class="fas fa-gears"></i>
            </div>
            
            <h1>网站维护中</h1>
            <p class="subtitle">我们正在对系统进行升级优化，以提供更好的服务体验。</p>
            
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-shimmer"></div>
                </div>
                <div class="progress-text">正在准备系统资源...</div>
            </div>
            
            <div class="time-info">
                <div class="time-item">
                    <span>开始时间</span>
                    <strong id="startTime">--/-- --:--</strong>
                </div>
                <div class="time-item">
                    <span>预计恢复</span>
                    <strong>暂未确定</strong>
                </div>
            </div>
            
            <div class="notify-form">
                <input type="email" placeholder="请输入邮箱接收通知" id="emailInput">
                <button onclick="showAlert()">通知我</button>
            </div>
        </div>
        
        <footer>
            © 2026 Your Company. All rights reserved.
        </footer>
    </div>

    <!-- iOS Alert -->
    <div class="modal-overlay" id="alertModal">
        <div class="modal">
            <div class="modal-title" id="modalTitle">已订阅</div>
            <div class="modal-message" id="modalMessage">恢复后我们将第一时间通知您。</div>
            <div class="modal-action" onclick="hideAlert()">好</div>
        </div>
    </div>

    <script>
        // 自动填充当前时间作为开始时间
        const now = new Date();
        const formatted = now.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' }) + ' ' + 
                          now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false });
        document.getElementById('startTime').textContent = formatted;

        function showAlert() {
            const email = document.getElementById('emailInput').value;
            const title = document.getElementById('modalTitle');
            const message = document.getElementById('modalMessage');
            
            if (!email || !email.includes('@')) {
                title.textContent = '输入无效';
                message.textContent = '请输入有效的邮箱地址。';
            } else {
                title.textContent = '订阅成功';
                message.textContent = `我们将在网站恢复后发送邮件至 ${email}`;
            }
            document.getElementById('alertModal').style.display = 'grid';
        }

        function hideAlert() {
            document.getElementById('alertModal').style.display = 'none';
        }
    </script>
</body>
</html>
